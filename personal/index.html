<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex Bensen</title>
    <link rel="icon" href="/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f1117;
            color: #d1d1d6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 5rem;
            font-weight: 300;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            margin-right: -0.25em;
        }

        .alias {
            color: #52525b;
            font-size: 1.15rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }

        .tagline {
            color: #a1a1aa;
            font-size: 1.4rem;
            margin-bottom: 3rem;
            text-decoration: none;
            display: block;
            transition: color 0.2s;
        }

        .tagline:hover {
            color: #d1d1d6;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: center;
        }

        .links > a, .profiles-wrapper {
            color: #a1a1aa;
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border: 1px solid #27272a;
            border-radius: 8px;
            font-size: 1.15rem;
            min-width: 250px;
            justify-content: center;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .links > a:hover {
            color: #e4e4e7;
            border-color: #52525b;
        }

        .mc-link { border-color: #2dd4bf30 !important; }
        .mc-link:hover { border-color: #2dd4bf !important; color: #2dd4bf !important; }

        .mc-icon {
            width: 28px;
            height: 28px;
            image-rendering: pixelated;
        }

        .links > a img.mc-icon {
            filter: grayscale(80%) opacity(0.7);
            transition: filter 0.2s;
        }

        .links > a:hover img.mc-icon {
            filter: grayscale(0%) opacity(1);
        }

        /* Profiles dropdown */
        .profiles-wrapper {
            position: relative;
            cursor: default;
            padding: 0;
            overflow: visible;
        }

        .profiles-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            width: 100%;
            cursor: default;
        }

        .profiles-toggle .arrow {
            font-size: 0.7rem;
            transition: transform 0.2s;
        }

        .profiles-wrapper:hover {
            border-color: #52525b;
        }

        .profiles-wrapper:hover .profiles-toggle {
            color: #e4e4e7;
        }

        .profiles-wrapper:hover .arrow {
            transform: rotate(180deg);
        }

        .profiles-menu {
            display: none;
            flex-direction: column;
            position: absolute;
            top: 100%;
            left: -1px;
            right: -1px;
            background: #0f1117;
            border: 1px solid #52525b;
            border-top: 1px solid #27272a;
            border-radius: 0 0 8px 8px;
            z-index: 10;
        }

        .profiles-wrapper:hover .profiles-menu {
            display: flex;
        }

        .profiles-wrapper:hover {
            border-radius: 8px 8px 0 0;
        }

        .profiles-menu a {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #a1a1aa;
            text-decoration: none;
            padding: 0.65rem 1.5rem;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .profiles-menu a:hover {
            background: #1a1a2e;
            color: #e4e4e7;
        }

        .profiles-menu a:last-child {
            border-radius: 0 0 8px 8px;
        }

        .profiles-menu .link-icon {
            width: 24px;
            height: 24px;
            image-rendering: pixelated;
            border-radius: 4px;
            filter: grayscale(60%) opacity(0.8);
            transition: filter 0.2s;
        }

        .profiles-menu a:hover .link-icon {
            filter: grayscale(0%) opacity(1);
        }

        .profiles-menu .platform {
            color: #52525b;
            font-size: 0.8rem;
            margin-left: auto;
        }

        .profiles-menu a:hover .platform.roblox { color: #e14242; }
        .profiles-menu a:hover .platform.minecraft { color: #8b6d45; }
        .profiles-menu a:hover .platform.fortnite { color: #00bfff; }

        .linkedin-sep {
            margin-top: 1.5rem;
        }

        .linkedin-link {
            border-color: #0a66c230 !important;
        }

        .linkedin-link:hover {
            border-color: #0a66c2 !important;
            color: #0a66c2 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vex</h1>
        <p class="alias">Alex Bensen</p>
        <p class="tagline">Full-Stack Developer &middot; Homelab Enthusiast</p>

        </div>
    </div>
    <script>
        fetch('https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=3927&size=48x48&format=Png&isCircular=false')

</body>
</html>
